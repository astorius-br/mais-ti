<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Funções em JavaScript</title>
    <lick rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="tituloPrincipal">Manipulando o DOM</h1>

    <button id="botao1">Mudar Texto (Declaração)</button>
    <button id="botao2">Mudar Cor (Expressão)</button>
    <button id="botao3">Esconder/Mostrar Título  (Arrow Function)</button>
    <button id="botao4">Mostrar Título (Função Anônima)</button>
    <button id="botao5">Arco-iris</button>
    <button id="botao6">Novo Titulo</button>
    <button id="botao7">Resetar</button>
<hr>
<h2>Cadastro de Usuário</h2>

<form id="formCadastro">
    <label>Nome:  <input type="text" id="inputNome" placeholder="Seu nome" required></label><br>
    <label>Email: <input type="text" id="inputEmail" placeholder="Seu email" required></label><br>
    <label>Idade: <input type="number" id="inputIdade" placeholder="Sua idade" required></label><br>
    <label>Senha: <input type="password" id="inputSenha" placeholder="Sua senha" required></label><br>
    <label>Cor favorita:
        <select id="inputCor">
            <option value="">Selecione...</option>
            <option value="red">Vermelho</option>
            <option value="blue">Azul</option>
            <option value="green">Verde</option>
            <option value="purple">Roxo</option>
        </select>
    </label><br>
    <button type="submit">Cadastrar</button>
</form>

<div id="resultadoCadastro"></div>
<script src="script2.js"></script>   
</body>
</html>
