<!DOCTYPE html>
<html>
    <meta charset="UTF-8"
    <head>Forms aqui</head>
    <body>
        <h1>Dados de Cadastro</h1>
        <form>
            Nome: <input type="text"> <br>
            E-mail:<input type="email"> <br>
            Senha: <input type="password"> <br>
            <hr>
            <input type="radio" name="funcao" value="Aluno">Aluno
            <input type="radio" name="funcao" value="Professor">Professor
            <input type="radio" name="funcao" value="Outro">Outro
            <br> <!-- name='tipo' é escolha fixa, "funcao" permite alterar-->
            <input type="submit"> <input type="reset">
            <br><br>
            <input type="date" name="data">
            <br>
            <h3>A fazer</h3> <!--checkbox é autoexplicativo e desselecionável-->
            <input type="checkbox" name="a fazer">Codar <br>
            <input type="checkbox" name="a fazer">Correr <br>
            <input type="checkbox" name="a fazer">Trabalhar <br>
        </form>
    </body>

</html>
